<!DOCTYPE html>
<html lang="en-US">
    <body>
        <canvas id="myCanvas" width="1600" height="4000">
            <!--style="background-color: #2B2B2B;"-->
            Your browser does not support the canvas element.
        </canvas>
        <button id="downloadBtn" style="font-size: 24px; padding: 16px 32px; margin: 20px;">Download PNG</button>
        <label style="font-size: 20px; margin: 20px;"><input type="checkbox" id="showDottedLinesCheckbox" checked> Show dotted cut guides</label>
    </body>
</html>
<script>
    const MO = "Mo";
    const TU = "Tu";
    const WE = "We";
    const TH = "Th";
    const FR = "Fr";
    const SA = "Sa";
    const SU = "Su";

    const FONT_FAMILY = '"DIN Alternate", "DIN Condensed", Arial, sans-serif';

    const YEAR = 2026;

    const POSTER_DPI = 600;
    const POSTER_WIDTH_IN = 12;
    const POSTER_HEIGHT_IN = 18;
    const POSTER_VERTICAL_MARGIN_IN = 0.5;
    const POSTER_GUTTER_IN = 0.5; // gap between the two copies, for cutting
    const posterWidthPx = POSTER_WIDTH_IN * POSTER_DPI;
    const posterHeightPx = POSTER_HEIGHT_IN * POSTER_DPI;

    function radian(r) {
        return r * Math.PI;
    }

    const canvas = document.getElementById("myCanvas");
    canvas.width = posterWidthPx;
    canvas.height = posterHeightPx;
    const ctx = canvas.getContext("2d");
    const margin = 50;
    const radius = 240;
    const lineWidth = 80;
    const daysOfWeekRadius = radius - 0.9 * lineWidth;
    const daysOfWeekWidth = lineWidth / 2;

    const arcFinishAngle = radian(0.218);
    const arcStartAngle = radian(2) - arcFinishAngle;

    const dX = 2 * Math.cos(arcFinishAngle) * radius;
    const dY = 2 * Math.sin(arcFinishAngle) * radius;
    const leftCenterX = margin + lineWidth / 2 + radius;
    const rightCenterX = leftCenterX + dX;

    let centerY = margin + lineWidth / 2 + radius;

    const singleCopyWidth = rightCenterX + radius + lineWidth / 2 + margin;
    const singleCopyHeight = 2 * margin + lineWidth + 2 * radius + 11 * dY;

    const verticalMarginPx = POSTER_VERTICAL_MARGIN_IN * POSTER_DPI;
    const gutterPx = POSTER_GUTTER_IN * POSTER_DPI;
    const scale = (posterHeightPx - 2 * verticalMarginPx) / singleCopyHeight;

    const pairWidthPx = 2 * scale * singleCopyWidth + gutterPx;
    const leftOffsetPx = (posterWidthPx - pairWidthPx) / 2;
    const topOffsetPx = (posterHeightPx - scale * singleCopyHeight) / 2;

    const cutGuideEdgeGap = gutterPx / 2; // same distance used between the center line and each calendar
    const cutGuideBorderLeft = leftOffsetPx - cutGuideEdgeGap;
    const cutGuideBorderRight = leftOffsetPx + 2 * scale * singleCopyWidth + gutterPx + cutGuideEdgeGap;
    const cutGuideBorderTop = topOffsetPx - cutGuideEdgeGap;
    const cutGuideBorderBottom = topOffsetPx + scale * singleCopyHeight + cutGuideEdgeGap;
    const cutGuideCenterX = leftOffsetPx + scale * singleCopyWidth + gutterPx / 2;

    // Lengths are in radians
    const gapLength = radian(2) / 360; // 1 degree

    const LEFT = -1;
    const RIGHT = 1;

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    function getTX(circleCenterX, angle, radius, segmentLength, direction) {
        return circleCenterX + Math.cos(angle + direction * segmentLength / 2) * radius;
    }

    function getTY(circleCenterY, angle, radius, segmentLength, direction) {
        return circleCenterY + Math.sin(angle + direction * segmentLength / 2) * radius;
    }

    function drawDayNumber(circleCenterX, circleCenterY, radius, angle, segmentLength, dayNumber, direction) {
        const tX = getTX(circleCenterX, angle, radius, segmentLength, direction);
        const tY = getTY(circleCenterY, angle, radius, segmentLength, direction);
        ctx.font = defaultFont(19);
        ctx.fillStyle = "white";
        ctx.fillText(dayNumber.toString().padStart(2, "0"), tX, tY);
    }

    function drawDayName(circleCenterX, circleCenterY, radius, angle, segmentLength, dayName, direction) {
        const tX = getTX(circleCenterX, angle, radius, segmentLength, direction);
        const tY = getTY(circleCenterY, angle, radius, segmentLength, direction);
        ctx.font = defaultFont(12);
        if (dayName === SA || dayName === SU)
            ctx.fillStyle = "orange";
        else
            ctx.fillStyle = "black";
        ctx.fillText(dayName, tX, tY);
    }

    function drawWeekNumber(circleCenterX, circleCenterY, radius, angle, segmentLength, weekNumber, direction) {
        const tX = getTX(circleCenterX, angle, radius, segmentLength, direction);
        const tY = getTY(circleCenterY, angle, radius, segmentLength, direction);
        ctx.font = defaultFont(14);
        ctx.fillStyle = "white";
        ctx.fillText(weekNumber.toString().padStart(2, "0"), tX, tY);
    }

    function nextDayName(dayName) {
        const nextDay = new Map([[MO, TU], [TU, WE], [WE, TH], [TH, FR], [FR, SA], [SA, SU], [SU, MO]]);
        return nextDay.get(dayName);
    }

    function Color(r, g, b) {
        this.r = r;
        this.g = g;
        this.b = b;
        this.rgb = function () {
            return 'rgb(' + r + ', ' + g + ', ' + b + ')';
        };
        this.delta = function (other, steps) {
            return new Color(d(this.r, other.r, steps), d(this.g, other.g, steps), d(this.b, other.b, steps));
        };

        function d(c1, c2, steps) {
            return (c1 - c2) / steps;
        }

        this.add = function (delta) {
            return new Color(this.r + delta.r, this.g + delta.g, this.b + delta.b);
        }
    }

    function Gradient(startColor, finishColor, steps) {
        this.deltaColor = finishColor.delta(startColor, steps);
        this.nextColor = startColor;
        this.next = function () {
            const result = this.nextColor.rgb();
            this.nextColor = this.nextColor.add(this.deltaColor);
            return result;
        }
    }

    function drawMonthName(monthName, x) {
        ctx.font = defaultFont(40);
        ctx.fillStyle = "white";
        ctx.fillText(monthName, x, centerY);
    }

    function drawBackground(centerX, centerY, radius, startAngle, finishAngle, lineWidth, color) {
        ctx.beginPath();
        ctx.lineWidth = lineWidth;
        ctx.strokeStyle = color;
        ctx.arc(centerX, centerY, radius, startAngle, finishAngle);
        ctx.stroke();
    }

    function drawMonth(direction, monthName, daysInMonth, centerX, startAngle, startColor, finishColor) {

        drawMonthName(monthName, centerX);

        const segmentAndGapLength = (arcStartAngle - arcFinishAngle) / daysInMonth;
        const segmentLength = segmentAndGapLength - gapLength;
        const gradientColor = new Gradient(startColor, finishColor, daysInMonth);

        for (let dayNumber = 1; dayNumber <= daysInMonth; dayNumber++) {
            const angle = startAngle + direction * segmentAndGapLength * (dayNumber - 1);
            const s = segmentLength;
            const segmentStartAngle = angle - s / 2 + direction * s / 2;
            const segmentFinishAngle = angle + s / 2 + direction * s / 2;
            drawBackground(centerX, centerY, radius, segmentStartAngle, segmentFinishAngle, lineWidth, gradientColor.next());
            drawBackground(centerX, centerY, daysOfWeekRadius, segmentStartAngle, segmentFinishAngle, daysOfWeekWidth, "grey");
            drawDayNumber(centerX, centerY, radius, angle, segmentLength, dayNumber, direction);
            drawDayName(centerX, centerY, daysOfWeekRadius, angle, segmentLength, dayName, direction);
            if (dayName === MO) {
                drawWeekNumber(centerX, centerY, daysOfWeekRadius - daysOfWeekWidth, angle, segmentLength, isoWeek(currentDate), direction);
            }
            dayName = nextDayName(dayName);
            currentDate.setDate(currentDate.getDate() + 1);
        }

        centerY += dY;
    }

    function drawRightMonth(monthName, daysInMonth, startColor, finishColor) {
        const startAngle = radian(1) + arcFinishAngle + gapLength / 2;
        drawMonth(RIGHT, monthName, daysInMonth, rightCenterX, startAngle, startColor, finishColor);
    }

    function drawLeftMonth(monthName, daysInMonth, startColor, finishColor) {
        const startAngle = arcStartAngle - gapLength / 2;
        drawMonth(LEFT, monthName, daysInMonth, leftCenterX, startAngle, startColor, finishColor);
    }

    const DAY_NAMES_BY_JS_INDEX = [SU, MO, TU, WE, TH, FR, SA];
    let dayName = DAY_NAMES_BY_JS_INDEX[new Date(YEAR, 0, 1).getDay()];
    let currentDate = new Date(YEAR, 0, 1);

    function daysInMonthOf(monthIndex) {
        return new Date(YEAR, monthIndex + 1, 0).getDate();
    }

    function isoWeek(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = (d.getUTCDay() + 6) % 7; // Mon=0..Sun=6
        d.setUTCDate(d.getUTCDate() - dayNum + 3); // nearest Thursday
        const firstThursday = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
        const firstThursdayDayNum = (firstThursday.getUTCDay() + 6) % 7;
        firstThursday.setUTCDate(firstThursday.getUTCDate() - firstThursdayDayNum + 3);
        return 1 + Math.round((d - firstThursday) / (7 * 24 * 60 * 60 * 1000));
    }

    const MorningGlory = new Color(159, 210, 213);
    const Pelorous = new Color(33, 121, 192);
    const Apple = new Color(104, 187, 89);
    const Citrus = new Color(161, 198, 0);
    const GoldenYellow = new Color(244, 237, 0);
    const HarleyDavidsonOrange = new Color(230, 74, 22);
    const Alizarin = new Color(227, 30, 39);
    const MoonYellow = new Color(242, 183, 21);
    const TulipTree = new Color(224, 172, 54);
    const Tussock = new Color(183, 131, 71);
    const AirForceBlue = new Color(85, 131, 157);

    let colors = [
        MorningGlory, Pelorous, Apple, Citrus,
        GoldenYellow, HarleyDavidsonOrange,
        Alizarin, MoonYellow, TulipTree, Tussock,
        AirForceBlue, Pelorous, MorningGlory
    ];

    function defaultFont(size, weight = "normal") {
        return weight + ' ' + size + 'px ' + FONT_FAMILY;
    }

    function drawTitle() {
        const x = rightCenterX;
        let y = centerY - dY / 2;

        const yearLabelGap = 75; // distance between "Year" and the year number
        const calendarLabelGap = 65; // distance between the year number and "Calendar"

        ctx.fillStyle = "white";

        ctx.font = defaultFont(40);
        ctx.fillText("Year", x, y - yearLabelGap);

        ctx.font = defaultFont(100, "bold");
        ctx.fillText(YEAR.toString(), x, y);

        ctx.font = defaultFont(40);
        ctx.fillText("Calendar", x, y + calendarLabelGap);

        const numberOfDots = 11;
        const w = 15;
        ctx.lineWidth = w;
        const g = w / 3;

        let m = x - (numberOfDots * w + (numberOfDots - 1) * g) / 2;
        let n = y + 100;

        for (let c = 0; c < numberOfDots; c++) {
            ctx.beginPath();
            ctx.strokeStyle = colors[c].rgb();
            ctx.moveTo(m, n);
            m += w;
            ctx.lineTo(m, n);
            m += g;
            ctx.stroke();
        }
    }

    function drawBack() {
        ctx.beginPath();
        ctx.fillStyle = "#2B2B2B";
        ctx.rect(0, 0, canvas.width, canvas.height);
        ctx.fill();
    }

    function drawCalendarBody() {
        centerY = margin + lineWidth / 2 + radius;
        dayName = DAY_NAMES_BY_JS_INDEX[new Date(YEAR, 0, 1).getDay()];
        currentDate = new Date(YEAR, 0, 1);

        drawTitle();

        let c = 0;

        drawLeftMonth("January", daysInMonthOf(0), colors[c], colors[++c]);
        drawRightMonth("February", daysInMonthOf(1), colors[c++], colors[c]);
        drawLeftMonth("March", daysInMonthOf(2), colors[c++], colors[c]);
        drawRightMonth("April", daysInMonthOf(3), colors[c++], colors[c]);
        drawLeftMonth("May", daysInMonthOf(4), colors[c++], colors[c]);
        drawRightMonth("June", daysInMonthOf(5), colors[c++], colors[c]);
        drawLeftMonth("July", daysInMonthOf(6), colors[c++], colors[c]);
        drawRightMonth("August", daysInMonthOf(7), colors[c++], colors[c]);
        drawLeftMonth("September", daysInMonthOf(8), colors[c++], colors[c]);
        drawRightMonth("October", daysInMonthOf(9), colors[c++], colors[c]);
        drawLeftMonth("November", daysInMonthOf(10), colors[c++], colors[c]);
        drawRightMonth("December", daysInMonthOf(11), colors[c++], colors[c]);
    }

    function drawDottedFrame() {
        ctx.strokeStyle = "white";
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.setLineDash([2, 22]);

        ctx.strokeRect(cutGuideBorderLeft, cutGuideBorderTop, cutGuideBorderRight - cutGuideBorderLeft, cutGuideBorderBottom - cutGuideBorderTop);

        ctx.beginPath();
        ctx.moveTo(cutGuideCenterX, cutGuideBorderTop);
        ctx.lineTo(cutGuideCenterX, cutGuideBorderBottom);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.lineCap = "butt";
    }

    function drawCropMarks() {
        // Short solid marks just outside the frame, for aligning a ruler when cutting.
        const markGap = 24; // gap between the frame and where the mark starts
        const markLength = 96;

        ctx.strokeStyle = "white";
        ctx.lineWidth = 6;

        function mark(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        // top-left corner
        mark(cutGuideBorderLeft - markGap - markLength, cutGuideBorderTop, cutGuideBorderLeft - markGap, cutGuideBorderTop);
        mark(cutGuideBorderLeft, cutGuideBorderTop - markGap - markLength, cutGuideBorderLeft, cutGuideBorderTop - markGap);
        // top-right corner
        mark(cutGuideBorderRight + markGap, cutGuideBorderTop, cutGuideBorderRight + markGap + markLength, cutGuideBorderTop);
        mark(cutGuideBorderRight, cutGuideBorderTop - markGap - markLength, cutGuideBorderRight, cutGuideBorderTop - markGap);
        // bottom-left corner
        mark(cutGuideBorderLeft - markGap - markLength, cutGuideBorderBottom, cutGuideBorderLeft - markGap, cutGuideBorderBottom);
        mark(cutGuideBorderLeft, cutGuideBorderBottom + markGap, cutGuideBorderLeft, cutGuideBorderBottom + markGap + markLength);
        // bottom-right corner
        mark(cutGuideBorderRight + markGap, cutGuideBorderBottom, cutGuideBorderRight + markGap + markLength, cutGuideBorderBottom);
        mark(cutGuideBorderRight, cutGuideBorderBottom + markGap, cutGuideBorderRight, cutGuideBorderBottom + markGap + markLength);

        // center dividing line, top and bottom
        mark(cutGuideCenterX, cutGuideBorderTop - markGap - markLength, cutGuideCenterX, cutGuideBorderTop - markGap);
        mark(cutGuideCenterX, cutGuideBorderBottom + markGap, cutGuideCenterX, cutGuideBorderBottom + markGap + markLength);
    }

    function render() {
        drawBack();

        ctx.save();
        ctx.translate(leftOffsetPx, topOffsetPx);
        ctx.scale(scale, scale);
        drawCalendarBody();
        ctx.restore();

        ctx.save();
        ctx.translate(leftOffsetPx + scale * singleCopyWidth + gutterPx, topOffsetPx);
        ctx.scale(scale, scale);
        drawCalendarBody();
        ctx.restore();

        if (document.getElementById("showDottedLinesCheckbox").checked) {
            drawDottedFrame();
        }
        drawCropMarks();
    }

    render();

    document.getElementById("showDottedLinesCheckbox").addEventListener("change", render);

    document.getElementById("downloadBtn").addEventListener("click", () => {
        canvas.toBlob((blob) => {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `calendar-poster-${YEAR}.png`;
            a.click();
        }, "image/png");
    });

</script>
